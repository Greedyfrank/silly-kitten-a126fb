<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logo Concepts | Kryos Security Group</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0e0e10;
      color: #e8e8ea;
      line-height: 1.6;
      padding: 3rem 1.5rem;
    }
    .wrap { max-width: 1100px; margin: 0 auto; }
    h1 {
      font-size: 1.75rem;
      letter-spacing: -0.01em;
      margin-bottom: 0.5rem;
    }
    .intro {
      color: #a0a0a8;
      margin-bottom: 3rem;
      font-size: 0.95rem;
    }
    .concept {
      background: #17171a;
      border: 1px solid #24242a;
      border-radius: 8px;
      padding: 2.5rem;
      margin-bottom: 2rem;
    }
    .concept-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid #24242a;
    }
    .concept-name {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.05em;
    }
    .concept-num {
      color: #c9a961;
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }
    .sizes {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 2rem;
      align-items: center;
    }
    .size-block { text-align: center; }
    .size-label {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #6a6a72;
      margin-top: 1rem;
    }
    .size-large { min-height: 180px; display: flex; align-items: center; justify-content: center; }
    .size-medium { min-height: 90px; display: flex; align-items: center; justify-content: center; }
    .size-small {
      min-height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0e0e10;
      width: 64px;
      height: 64px;
      border-radius: 8px;
      margin: 0 auto;
    }
    @media (max-width: 700px) {
      .sizes { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Logo concepts</h1>
    <p class="intro">Three directions for Kryos Security Group. Each shown at large, header, and favicon sizes. Pick the one you want.</p>

    <!-- CONCEPT 1: Shield Monogram -->
    <div class="concept">
      <div class="concept-header">
        <span class="concept-name">Shield Monogram</span>
        <span class="concept-num">Concept 01</span>
      </div>
      <div class="sizes">
        <div class="size-block">
          <div class="size-large">
            <svg width="160" height="180" viewBox="0 0 100 112" xmlns="http://www.w3.org/2000/svg">
              <path d="M50 4 L92 18 V56 C92 80 74 100 50 108 C26 100 8 80 8 56 V18 Z"
                    fill="none" stroke="#c9a961" stroke-width="3" stroke-linejoin="round"/>
              <path d="M50 14 L84 25 V55 C84 75 70 92 50 99 C30 92 16 75 16 55 V25 Z"
                    fill="#c9a961" opacity="0.08"/>
              <text x="50" y="68" text-anchor="middle" font-family="Georgia, serif" font-weight="700"
                    font-size="48" fill="#c9a961">K</text>
            </svg>
          </div>
          <div class="size-label">Large</div>
        </div>
        <div class="size-block">
          <div class="size-medium">
            <svg width="60" height="68" viewBox="0 0 100 112" xmlns="http://www.w3.org/2000/svg">
              <path d="M50 4 L92 18 V56 C92 80 74 100 50 108 C26 100 8 80 8 56 V18 Z"
                    fill="none" stroke="#c9a961" stroke-width="3" stroke-linejoin="round"/>
              <text x="50" y="68" text-anchor="middle" font-family="Georgia, serif" font-weight="700"
                    font-size="48" fill="#c9a961">K</text>
            </svg>
          </div>
          <div class="size-label">Header</div>
        </div>
        <div class="size-block">
          <div class="size-small">
            <svg width="40" height="44" viewBox="0 0 100 112" xmlns="http://www.w3.org/2000/svg">
              <path d="M50 4 L92 18 V56 C92 80 74 100 50 108 C26 100 8 80 8 56 V18 Z"
                    fill="none" stroke="#c9a961" stroke-width="4" stroke-linejoin="round"/>
              <text x="50" y="70" text-anchor="middle" font-family="Georgia, serif" font-weight="700"
                    font-size="52" fill="#c9a961">K</text>
            </svg>
          </div>
          <div class="size-label">Favicon</div>
        </div>
      </div>
    </div>

    <!-- CONCEPT 2: Hexagonal -->
    <div class="concept">
      <div class="concept-header">
        <span class="concept-name">Hexagonal Mark</span>
        <span class="concept-num">Concept 02</span>
      </div>
      <div class="sizes">
        <div class="size-block">
          <div class="size-large">
            <svg width="180" height="160" viewBox="0 0 110 100" xmlns="http://www.w3.org/2000/svg">
              <polygon points="55,4 100,28 100,72 55,96 10,72 10,28"
                       fill="none" stroke="#c9a961" stroke-width="3" stroke-linejoin="miter"/>
              <polygon points="55,14 91,33 91,67 55,86 19,67 19,33"
                       fill="#c9a961" opacity="0.06"/>
              <text x="55" y="66" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif"
                    font-weight="800" font-size="48" fill="#c9a961" letter-spacing="-2">K</text>
            </svg>
          </div>
          <div class="size-label">Large</div>
        </div>
        <div class="size-block">
          <div class="size-medium">
            <svg width="70" height="64" viewBox="0 0 110 100" xmlns="http://www.w3.org/2000/svg">
              <polygon points="55,4 100,28 100,72 55,96 10,72 10,28"
                       fill="none" stroke="#c9a961" stroke-width="3" stroke-linejoin="miter"/>
              <text x="55" y="66" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif"
                    font-weight="800" font-size="48" fill="#c9a961" letter-spacing="-2">K</text>
            </svg>
          </div>
          <div class="size-label">Header</div>
        </div>
        <div class="size-block">
          <div class="size-small">
            <svg width="44" height="40" viewBox="0 0 110 100" xmlns="http://www.w3.org/2000/svg">
              <polygon points="55,4 100,28 100,72 55,96 10,72 10,28"
                       fill="none" stroke="#c9a961" stroke-width="5" stroke-linejoin="miter"/>
              <text x="55" y="68" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif"
                    font-weight="800" font-size="52" fill="#c9a961" letter-spacing="-2">K</text>
            </svg>
          </div>
          <div class="size-label">Favicon</div>
        </div>
      </div>
    </div>

    <!-- CONCEPT 3: Bracketed K -->
    <div class="concept">
      <div class="concept-header">
        <span class="concept-name">Bracketed Monogram</span>
        <span class="concept-num">Concept 03</span>
      </div>
      <div class="sizes">
        <div class="size-block">
          <div class="size-large">
            <svg width="200" height="160" viewBox="0 0 120 100" xmlns="http://www.w3.org/2000/svg">
              <!-- Left bracket -->
              <path d="M22 12 L10 12 L10 88 L22 88" fill="none" stroke="#c9a961" stroke-width="3"/>
              <!-- Right bracket -->
              <path d="M98 12 L110 12 L110 88 L98 88" fill="none" stroke="#c9a961" stroke-width="3"/>
              <!-- K -->
              <text x="60" y="68" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
                    font-weight="700" font-size="58" fill="#e8e8ea" letter-spacing="-1">K</text>
            </svg>
          </div>
          <div class="size-label">Large</div>
        </div>
        <div class="size-block">
          <div class="size-medium">
            <svg width="80" height="64" viewBox="0 0 120 100" xmlns="http://www.w3.org/2000/svg">
              <path d="M22 12 L10 12 L10 88 L22 88" fill="none" stroke="#c9a961" stroke-width="3"/>
              <path d="M98 12 L110 12 L110 88 L98 88" fill="none" stroke="#c9a961" stroke-width="3"/>
              <text x="60" y="68" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
                    font-weight="700" font-size="58" fill="#e8e8ea" letter-spacing="-1">K</text>
            </svg>
          </div>
          <div class="size-label">Header</div>
        </div>
        <div class="size-block">
          <div class="size-small">
            <svg width="50" height="40" viewBox="0 0 120 100" xmlns="http://www.w3.org/2000/svg">
              <path d="M22 12 L10 12 L10 88 L22 88" fill="none" stroke="#c9a961" stroke-width="5"/>
              <path d="M98 12 L110 12 L110 88 L98 88" fill="none" stroke="#c9a961" stroke-width="5"/>
              <text x="60" y="72" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
                    font-weight="700" font-size="64" fill="#e8e8ea" letter-spacing="-1">K</text>
            </svg>
          </div>
          <div class="size-label">Favicon</div>
        </div>
      </div>
    </div>

  </div>
</body>
</html>
